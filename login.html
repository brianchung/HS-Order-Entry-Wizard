<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>HypaShip - Login</title>
	<!-- Bootstrap 5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons (for eye icon) -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<!-- Add this in <head> BEFORE your CSS -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
	<link rel="icon" type="image/x-icon" href="images/favicon.png">
  </style>
</head>
<body>
  <div class="login-container">
    <div class="frame">
      <div class="row g-0">
        <!-- LEFT (Hero) -->
        <div class="col-sm-12 col-mg-7 col-lg-7">
          <div class="login-left-panel">
            <div class="brandbar">
				      <img src="images/logo.png" alt="logo">
            </div>
            <div class="headline">
              <h2>Post, Parcel &amp; Logistics<br/>Technology from the Experts</h2>
            </div>
          </div>
        </div>
        <!-- RIGHT (Login) -->
        <div class="col-sm-12 col-mg-5 col-lg-5">
          <div class="login-right-panel d-flex align-items-center">
            <div class="w-100">
              <div class="login-title">Login</div>
              <div class="login-sub">Login to Demo.</div>
              <form>
                <div class="form-floating mb-3">
				          <input type="text" class="form-control" id="username" value="" placeholder="username">
                  <label for="username">Username</label>
                </div>
                <div class="input-group mb-3">
                  <div class="form-floating">
                    <input type="password" class="form-control" id="password" placeholder="password" value="">
                    <label for="password">Password</label>
                  </div>
                  <button class="btn btn-outline-secondary" type="button" id="togglePw" aria-label="Show password" onclick="togglePassword()">
                    <i class="bi bi-eye"></i>
                  </button>
				        </div>
                <div class="text-center mb-3">
                  <a class="link-muted" href="#">Forget Password?</a>
                </div>
                <button class="btn btn-primary w-100" type="submit">Sign In</button>
                <div class="divider"> </div>
                <div class="helper">Don’t have an account yet?</div>
                <button class="btn btn-outline-brand w-100 btn-outline-brand mb-3" type="button">
                  Create An Account
                </button>
                <button class="btn btn-outline-brand w-100 btn-outline-brand" type="button" onclick="location.href='quote-location.html'">
                  Proceed As Guest
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/password_toggle.js"></script>
</body>
</html>
