<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen - HypaShip</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f3f3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        
        .login-container {
            display: flex;
            max-width: 1392px;
            width: 100%;
            height: 738px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .left-panel {
            width: 952px;
            background: linear-gradient(0.126757deg, rgba(255, 255, 255, 0.34) 38.8%, rgb(0, 159, 227) 99.873%);
            border-radius: 16px 0 0 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        
        .left-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 220%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1200');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }
        
        .left-panel-content {
            position: relative;
            z-index: 1;
        }
        
        .logo {
            width: 258px;
            height: 86px;
            margin-bottom: 44px;
        }
        
        .tagline {
            font-size: 30px;
            font-weight: 700;
            color: #fcfcfc;
            max-width: 438px;
            text-shadow: 0px 0px 8px rgba(0, 116, 166, 0.54);
            line-height: normal;
        }
        
        .right-panel {
            width: 440px;
            background-color: #fcfcfc;
            border: 1px solid #d3d3d3;
            border-left: none;
            border-radius: 0 16px 16px 0;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
        }
        
        .title-section {
            text-align: center;
        }
        
        .title-section h1 {
            font-size: 24px;
            font-weight: 700;
            color: #181818;
            margin-bottom: 0;
        }
        
        .title-section p {
            font-size: 16px;
            color: #052432;
            margin-bottom: 0;
        }
        
        .form-label-custom {
            font-size: 12px;
            color: #5b5b5b;
            margin-bottom: 4px;
            display: block;
        }
        
        .form-control-custom {
            height: 50px;
            border: 1px solid #838383;
            border-radius: 8px;
            padding: 8px;
            font-size: 16px;
            color: #181818;
            background-color: #fcfcfc;
        }
        
        .form-control-custom:focus {
            border-color: #009fe3;
            box-shadow: none;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 24px;
            height: 24px;
        }
        
        .forgot-password {
            text-align: right;
        }
        
        .forgot-password a {
            color: #009fe3;
            font-size: 14px;
            text-decoration: none;
        }
        
        .btn-primary-custom {
            height: 50px;
            border-radius: 24px;
            background-color: #009fe3;
            border: 1px solid #0094d4;
            color: #fcfcfc;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
        }
        
        .btn-primary-custom:hover {
            background-color: #0094d4;
        }
        
        .btn-secondary-custom {
            height: 50px;
            border-radius: 24px;
            background-color: #fcfcfc;
            border: 1px solid #0094d4;
            color: #181818;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
        }
        
        .btn-secondary-custom:hover {
            background-color: #f0f0f0;
        }
        
        .divider {
            border-top: 1px dashed #ababab;
            width: 100%;
        }
        
        .signup-section {
            text-align: center;
        }
        
        .signup-section p {
            font-size: 16px;
            color: #052432;
            margin-bottom: 16px;
        }
        
        @media (max-width: 1440px) {
            .login-container {
                max-width: 100%;
            }
        }
        
        @media (max-width: 992px) {
            .login-container {
                flex-direction: column;
                height: auto;
            }
            
            .left-panel {
                width: 100%;
                border-radius: 16px 16px 0 0;
                min-height: 300px;
            }
            
            .right-panel {
                width: 100%;
                border-radius: 0 0 16px 16px;
                border: 1px solid #d3d3d3;
            }
        }
    </style>
</head>

                <!-- Tagline -->
                <p class="tagline">Post, Parcel & Logistics Technology from the Experts</p>
            </div>
        </div>
        
        <!-- Right Panel -->
        <div class="right-panel">
            <!-- Title -->
            <div class="title-section">
                <h1>Login</h1>
                <p>Login to Demo.</p>
            </div>
            
            <!-- Username Field -->
            <div>
                <label class="form-label-custom">Username</label>
                <input type="text" class="form-control form-control-custom" value="brian.chung">
            </div>
            
            <!-- Password Field -->
            <div>
                <label class="form-label-custom">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordField" class="form-control form-control-custom" value="**********">
                    <svg class="password-toggle" onclick="togglePassword()" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                    </svg>
                </div>
            </div>
            
            <!-- Forgot Password -->
            <div class="forgot-password">
                <a href="#">Forget Password?</a>
            </div>
            
            <!-- Sign In Button -->
            <button type="button" class="btn btn-primary-custom">Sign In</button>
            
            <!-- Divider -->
            <div class="divider"></div>
            
            <!-- Sign Up Section -->
            <div class="signup-section">
                <p>Don't have an account yet?</p>
                <button type="button" class="btn btn-secondary-custom">Create An Account</button>
            </div>
            
            <!-- Divider -->
            <div class="divider"></div>
            
            <!-- Guest Button -->
            <button type="button" class="btn btn-secondary-custom">Proceed As Guest</button>
        </div>
    </div>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('passwordField');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
            } else {
                passwordField.type = 'password';
            }
        }
    </script>
</body>
</html>
